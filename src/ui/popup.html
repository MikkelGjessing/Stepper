<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper 3.0</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header (Sticky) -->
    <header class="header">
      <h1 class="title">Stepper 3.0</h1>
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
    </header>

    <!-- Search View -->
    <div id="searchView" class="view-container">
      <!-- Search Input -->
      <div class="search-section">
        <div class="search-container">
          <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Ask me anything or search for guides..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">🔍</button>
        </div>
      </div>

      <!-- Results List -->
      <div class="results-content">
        <div class="panel-header">
          <h2>Search Results</h2>
          <span class="result-count" id="resultCount">0 articles</span>
        </div>
        <div class="results-list" id="resultsList">
          <div class="empty-state">
            <p>👋 Welcome to Stepper 3.0!</p>
            <p>Search for step-by-step guides to get started.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Article View (Step-by-step mode) -->
    <div id="articleView" class="view-container" style="display: none;">
      <div class="article-content-scrollable" id="articleContentScrollable">
        <!-- Content will be dynamically inserted here -->
      </div>
    </div>

    <!-- Preview View (All steps) -->
    <div id="previewView" class="view-container" style="display: none;">
      <div class="preview-header">
        <button class="back-btn" id="previewBackBtn">← Back to Step</button>
        <h2>All Steps Preview</h2>
      </div>
      <div class="preview-content" id="previewContent">
        <!-- Preview steps will be dynamically inserted here -->
      </div>
    </div>

    <!-- Footer (Sticky) -->
    <footer class="footer">
      <button class="footer-btn" id="refreshBtn">🔄 Refresh</button>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="../lib/storage.js"></script>
  <script src="../lib/articles.js"></script>
  <script src="../lib/search.js"></script>
  <script src="popup.js"></script>
</body>
</html>
