<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper 3.0</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header (Sticky) -->
    <header class="header">
      <h1 class="title">Stepper 3.0</h1>
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
    </header>
    
    <!-- Fallback message when JavaScript is disabled -->
    <noscript>
      <div style="padding: 20px; text-align: center; color: #666;">
        <p>⚠️ JavaScript is required for this extension to work.</p>
        <p>Please enable JavaScript in your browser.</p>
      </div>
    </noscript>

    <!-- Search View -->
    <div id="searchView" class="view-container">
      <!-- Search Input -->
      <div class="search-section">
        <div class="search-container">
          <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Ask me anything or search for guides..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">🔍</button>
        </div>
      </div>

      <!-- Welcome Message (shown before first search) -->
      <div id="welcomeMessage" class="welcome-message">
        <p>👋 Welcome to Stepper 3.0!</p>
        <p>Search for step-by-step guides to get started.</p>
      </div>

      <!-- Results List (shown after search) -->
      <div class="results-content" id="resultsContent" style="display: none;">
        <div class="panel-header">
          <h2>Search Results</h2>
          <span class="result-count" id="resultCount">0 articles</span>
        </div>
        <div class="results-list" id="resultsList">
        </div>
      </div>
    </div>

    <!-- Article View (Step-by-step mode) -->
    <div id="articleView" class="view-container" style="display: none;">
      <div id="articleHeader" class="article-step-header"></div>
      <div id="articleContentScrollable" class="article-step-content"></div>
      <div id="articleFooter" class="article-step-footer">
        <div id="articleNavContainer"></div>
        <div id="stepCounter" class="step-counter-label"></div>
      </div>
    </div>

    <!-- Full Article View -->
    <div id="fullArticleView" class="view-container" style="display: none;">
      <div class="full-article-content-scrollable" id="fullArticleContentScrollable">
        <!-- Full article content will be dynamically inserted here -->
      </div>
    </div>

    <!-- Complete View (Completion Summary) -->
    <div id="completeView" class="view-container" style="display: none;">
      <div class="complete-content-scrollable" id="completeContentScrollable">
        <!-- Completion summary will be dynamically inserted here -->
      </div>
    </div>

    <!-- Footer (Sticky) -->
    <footer class="footer">
      <button class="footer-btn" id="refreshBtn">🔄 Refresh</button>
    </footer>

    <!-- Chat Drawer Trigger Button (shown when enableChat is true) -->
    <button class="chat-trigger-btn" id="chatTriggerBtn" style="display:none;" aria-label="Ask Stepper">
      💬 Ask Stepper
    </button>

    <!-- Chat Drawer -->
    <div class="chat-drawer" id="chatDrawer" aria-hidden="true">
      <div class="chat-drawer-header">
        <div class="chat-drawer-header-left">
          <span class="chat-drawer-title">Ask Stepper</span>
          <span class="chat-context-label" id="chatContextLabel">Asking Stepper knowledge base</span>
        </div>
        <div class="chat-drawer-header-right">
          <button class="chat-mode-switch" id="chatModeSwitch" style="display:none;"></button>
          <button class="chat-drawer-resize" id="chatDrawerResize" title="Expand / Shrink" aria-label="Toggle drawer size">⤢</button>
          <button class="chat-drawer-close" id="chatDrawerClose" title="Close chat" aria-label="Close chat">✕</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages" role="log" aria-live="polite">
        <!-- Messages rendered by JS -->
      </div>

      <div class="chat-input-row">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Ask a question…"
          rows="1"
          aria-label="Chat message input"
        ></textarea>
        <button class="chat-send-btn" id="chatSendBtn" aria-label="Send message">➤</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../lib/storage.js"></script>
  <script src="../lib/normalizer.js"></script>
  <script src="../lib/articles.js"></script>
  <script src="../lib/parser_strategies.js"></script>
  <script src="../lib/ingestion.js"></script>
  <script src="../lib/search.js"></script>
  <script src="popup.js"></script>
</body>
</html>
